<style>
  /* ────────────── DESIGN TOKENS ────────────── */
  :root {
    --mb-bg:       #0a0a1a;
    --mb-surface:  #12122a;
    --mb-card:     #1a1a3a;
    --mb-border:   rgba(255,100,50,0.15);

    --mb-ember:    #ff9f43;
    --mb-lava:     #e74c3c;
    --mb-gold:     #ffd700;
    --mb-text:     #e8e6f0;
    --mb-muted:    rgba(255,255,255,0.45);
    --mb-truth:    #2ecc71;
    --mb-lie:      #e74c3c;
    --mb-radius:   1rem;
    --mb-glow:     0 0 30px rgba(255,107,53,0.15);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Poppins', sans-serif;
    background: var(--mb-bg);
    color: var(--mb-text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── Breadcrumb ── */
  .mb-breadcrumb {
    padding: 12px 20px;
    font-size: 0.85rem;
    background: rgba(10,10,26,0.95);
    border-bottom: 1px solid var(--mb-border);
    color: var(--mb-muted);
    display: flex; align-items: center; gap: 6px; flex-wrap: wrap;
  }
  .mb-breadcrumb a {
    color: var(--mb-flame);
    text-decoration: none;
    font-weight: 600;
    transition: color 0.2s;
  }
  .mb-breadcrumb a:hover { color: var(--mb-ember); }
  .mb-breadcrumb .sep { color: rgba(255,255,255,0.2); }

  /* ── Hero Header ── */
  .mb-hero {
    text-align: center;
    padding: 3rem 1.5rem 2rem;
    position: relative;
  }
  .mb-hero::before {
    content: '';
    position: absolute;
    top: 0; left: 50%;
    transform: translateX(-50%);
    width: 400px; height: 400px;
    background: radial-gradient(circle, rgba(255,107,53,0.08) 0%, transparent 70%);
    pointer-events: none;
  }
  .mb-hero-icon {
    font-size: 3.5rem;
    margin-bottom: 0.5rem;
    display: inline-block;
    animation: flamePulse 2s ease-in-out infinite;
  }
  @keyframes flamePulse {
    0%,100% { filter: drop-shadow(0 0 8px rgba(255,107,53,0.4)); transform: scale(1); }
    50%     { filter: drop-shadow(0 0 20px rgba(255,107,53,0.7)); transform: scale(1.08); }
  }
  .mb-hero h1 {
    font-size: clamp(2rem, 5vw, 3rem);
    font-weight: 800;
    background: linear-gradient(135deg, var(--mb-flame), var(--mb-ember), var(--mb-gold));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 0.5rem;
  }
  .mb-hero-sub {
    color: var(--mb-muted);
    font-size: 1rem;
    max-width: 500px;
    margin: 0 auto;
  }

  /* ── Section Tabs (Video Shorts / Text Myths) ── */
  .mb-mode-tabs {
    display: flex;
    justify-content: center;
    gap: 0.5rem;
    padding: 0 1.5rem;
    margin-bottom: 2rem;
  }
  .mb-mode-btn {
    padding: 0.7rem 1.8rem;
    background: var(--mb-card);
    border: 2px solid var(--mb-border);
    border-radius: 50px;
    color: var(--mb-muted);
    font-family: 'Poppins', sans-serif;
    font-weight: 600;
    font-size: 0.95rem;
    cursor: pointer;
    transition: all 0.3s;
  }
  .mb-mode-btn:hover {
    border-color: var(--mb-flame);
    color: var(--mb-text);
  }
  .mb-mode-btn.active {
    background: linear-gradient(135deg, var(--mb-flame), var(--mb-lava));
    border-color: transparent;
    color: #fff;
    box-shadow: 0 4px 20px rgba(255,107,53,0.3);
  }

  /* ── Container ── */
  .mb-container {
    max-width: 900px;
    margin: 0 auto;
    padding: 0 1.5rem 3rem;
  }

  /* ── Video Shorts Panel ── */
  .mb-panel { display: none; }
  .mb-panel.active { display: block; }

  .mb-video-coming {
    text-align: center;
    padding: 4rem 2rem;
    background: var(--mb-surface);
    border: 2px dashed var(--mb-border);
    border-radius: var(--mb-radius);
  }
  .mb-video-coming i {
    font-size: 3rem;
    color: var(--mb-flame);
    margin-bottom: 1rem;
    display: block;
    opacity: 0.6;
  }
  .mb-video-coming h3 {
    font-size: 1.4rem;
    color: var(--mb-ember);
    margin-bottom: 0.5rem;
  }
  .mb-video-coming p {
    color: var(--mb-muted);
    max-width: 400px;
    margin: 0 auto;
    line-height: 1.6;
  }

    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 1.5rem;
  }

    flex: 1;
    height: 4px;
    background: var(--mb-card);
    border-radius: 2px;
    margin: 0 1rem;
    overflow: hidden;
  }
  .mb-progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--mb-flame), var(--mb-ember));
    border-radius: 2px;
    transition: width 0.4s ease;
  }
  .mb-progress-label {
    font-size: 0.8rem;
    color: var(--mb-muted);
    white-space: nowrap;
  }

  .mb-myth-card {
    background: var(--mb-surface);
    border: 1px solid var(--mb-border);
    border-radius: var(--mb-radius);
    padding: 2rem;
    box-shadow: var(--mb-glow);
    position: relative;
    overflow: hidden;
  }
  .mb-myth-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--mb-flame), var(--mb-ember), var(--mb-gold));
  }

  .mb-myth-number {
    display: inline-block;
    background: linear-gradient(135deg, var(--mb-flame), var(--mb-lava));
    color: #fff;
    font-weight: 800;
    font-size: 0.75rem;
    padding: 0.3rem 0.8rem;
    border-radius: 50px;
    letter-spacing: 0.05em;
    margin-bottom: 1rem;
  }

  .mb-myth-title {
    font-size: 1.6rem;
    font-weight: 700;
    color: #fff;
    margin-bottom: 1rem;
    line-height: 1.3;
  }

  .mb-label {
    display: flex;
    align-items: flex-start;
    gap: 0.6rem;
    margin-bottom: 1rem;
    padding: 0.8rem 1rem;
    border-radius: 0.6rem;
    font-size: 0.95rem;
    line-height: 1.5;
  }
  .mb-label-lie {
    background: rgba(231,76,60,0.1);
    border-left: 3px solid var(--mb-lie);
  }
  .mb-label-lie .mb-label-icon { color: var(--mb-lie); }
  .mb-label-truth {
    background: rgba(46,204,113,0.1);
    border-left: 3px solid var(--mb-truth);
  }
  .mb-label-truth .mb-label-icon { color: var(--mb-truth); }
  .mb-label-icon { font-size: 1.1rem; margin-top: 2px; flex-shrink: 0; }
  .mb-label-tag {
    font-weight: 700;
    text-transform: uppercase;
    font-size: 0.7rem;
    letter-spacing: 0.08em;
    display: block;
    margin-bottom: 2px;
  }
  .mb-label-lie .mb-label-tag { color: var(--mb-lie); }
  .mb-label-truth .mb-label-tag { color: var(--mb-truth); }

  /* ── Source Tabs ── */
  .mb-source-tabs {
    display: flex;
    gap: 0.25rem;
    margin-top: 1.5rem;
    margin-bottom: 0;
    overflow-x: auto;
  }
  .mb-source-tab {
    flex: 1;
    min-width: 0;
    padding: 0.6rem 0.5rem;
    background: var(--mb-card);
    border: 1px solid transparent;
    border-bottom: none;
    border-radius: 0.6rem 0.6rem 0 0;
    color: var(--mb-muted);
    font-family: 'Poppins', sans-serif;
    font-weight: 600;
    font-size: 0.78rem;
    cursor: pointer;
    transition: all 0.3s;
    text-align: center;
    white-space: nowrap;
  }
  .mb-source-tab:hover { color: var(--mb-text); border-color: var(--mb-border); }
  .mb-source-tab[aria-selected="true"] {
    background: var(--mb-card);
    border-color: var(--mb-flame);
    border-bottom-color: var(--mb-card);
    color: var(--mb-flame);
  }

  .mb-source-panel {
    border: 1px solid var(--mb-flame);
    border-top: none;
    border-radius: 0 0 0.8rem 0.8rem;
    padding: 1.2rem 1.5rem;
    min-height: 100px;
    background: var(--mb-card);
    white-space: pre-wrap;
    font-style: italic;
    color: rgba(255,255,255,0.7);
    line-height: 1.7;
    font-size: 0.92rem;
  }
  .mb-source-panel[hidden] { display: none; }

  /* ── Navigation ── */
  .mb-nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 1.5rem;
    gap: 0.5rem;
  }
  .mb-nav-btn {
    display: flex; align-items: center; gap: 0.5rem;
    padding: 0.7rem 1.5rem;
    background: linear-gradient(135deg, var(--mb-flame), var(--mb-lava));
    border: none;
    border-radius: 50px;
    color: #fff;
    font-family: 'Poppins', sans-serif;
    font-weight: 700;
    font-size: 0.9rem;
    cursor: pointer;
    transition: all 0.3s;
    box-shadow: 0 4px 15px rgba(255,107,53,0.25);
  }
  .mb-nav-btn:hover:not(:disabled) {
    transform: translateY(-2px);
    box-shadow: 0 6px 25px rgba(255,107,53,0.4);
  }
  .mb-nav-btn:disabled {
    background: var(--mb-card);
    color: var(--mb-muted);
    box-shadow: none;
    cursor: not-allowed;
  }

  /* ── Back to Home Link ── */
  .mb-back-link {
    display: block;
    text-align: center;
    margin-top: 2.5rem;
    padding: 1rem;
  }
  .mb-back-link a {
    color: var(--mb-muted);
    text-decoration: none;
    font-weight: 600;
    font-size: 0.9rem;
    transition: color 0.2s;
  }
  .mb-back-link a:hover { color: var(--mb-flame); }
  .mb-back-link a i { margin-right: 0.4rem; }

  /* ── Responsive ── */
  @media (max-width: 600px) {
    .mb-myth-card { padding: 1.5rem 1rem; }
    .mb-myth-title { font-size: 1.3rem; }
    .mb-source-tab { font-size: 0.7rem; padding: 0.5rem 0.3rem; }
    .mb-nav-btn { padding: 0.6rem 1rem; font-size: 0.8rem; }
    .mb-mode-btn { padding: 0.6rem 1.2rem; font-size: 0.85rem; }

</style>

      lie: "The soul never dies and immediately goes to heaven or hell after death.",
      truth: "The soul is not inherently immortal; it dies and awaits resurrection. Hell is the grave, not a fiery torment.",
      bible: `Genesis 2:7 — The soul is the living body.\n\nEzekiel 18:4 — The soul that sins shall die.\n\nPsalm 146:4 — When a person dies, their thoughts perish.`,
      sop: `"The soul that sins will die; there is no conscious existence in death." — Steps to Christ, Ch. 8`,
      gc: `"The immortality of the soul is a doctrine from paganism, not the Bible." — Great Controversy, p. 527`,
      sc: `"Death is a sleep until the resurrection." — Selected Messages, Vol. 1, p. 232`
    }
  ];

  /* ── DOM References ── */
  let currentIndex = 0;
  const mythTitle   = document.getElementById("mythTitle");
  const mythLie     = document.getElementById("mythLie");
  const mythTruth   = document.getElementById("mythTruth");
  const mythNumber  = document.getElementById("mythNumber");
  const progressLabel = document.getElementById("progressLabel");
  const progressFill  = document.getElementById("progressFill");
  const srcBible = document.getElementById("src-bible");
  const srcSOP   = document.getElementById("src-sop");
  const srcGC    = document.getElementById("src-gc");
  const srcSC    = document.getElementById("src-sc");
  const tabs     = document.querySelectorAll(".mb-source-tab");
  const prevBtn  = document.getElementById("prevBtn");
  const nextBtn  = document.getElementById("nextBtn");

  /* ── Update Myth Display ── */
  function updateMyth(index) {
    const myth = myths[index];
    mythTitle.textContent  = myth.title;
    mythLie.textContent    = myth.lie;
    mythTruth.textContent  = myth.truth;
    mythNumber.textContent = `MYTH ${index + 1}`;
    srcBible.textContent   = myth.bible;
    srcSOP.textContent     = myth.sop;
    srcGC.textContent      = myth.gc;
    srcSC.textContent      = myth.sc;

    // Progress
    progressLabel.textContent = `Myth ${index + 1} of ${myths.length}`;
    progressFill.style.width  = `${((index + 1) / myths.length) * 100}%`;

    // Reset source tabs
    tabs.forEach(t => { t.setAttribute("aria-selected","false"); t.setAttribute("tabindex","-1"); });
    tabs[0].setAttribute("aria-selected","true");
    tabs[0].setAttribute("tabindex","0");
    srcBible.hidden = false;
    srcSOP.hidden = true;
    srcGC.hidden = true;
    srcSC.hidden = true;

    // Nav buttons
    prevBtn.disabled = index === 0;
    nextBtn.disabled = index === myths.length - 1;
  }

  /* ── Source Tab Switching ── */
  tabs.forEach(tab => {
    tab.addEventListener("click", () => {
      if (tab.getAttribute("aria-selected") === "true") return;
      tabs.forEach(t => { t.setAttribute("aria-selected","false"); t.setAttribute("tabindex","-1"); });
      tab.setAttribute("aria-selected","true");
      tab.setAttribute("tabindex","0");
      const target = document.getElementById(tab.getAttribute("aria-controls"));
      document.querySelectorAll(".mb-source-panel").forEach(p => { p.hidden = (p !== target); });
      target.focus();
    });
  });

  /* ── Prev / Next ── */
  prevBtn.addEventListener("click", () => { if (currentIndex > 0) { currentIndex--; updateMyth(currentIndex); } });
  nextBtn.addEventListener("click", () => { if (currentIndex < myths.length - 1) { currentIndex++; updateMyth(currentIndex); } });

  /* ── Mode Tab Switching (Myth Busting / Video Shorts) ── */
  document.querySelectorAll(".mb-mode-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      document.querySelectorAll(".mb-mode-btn").forEach(b => { b.classList.remove("active"); b.setAttribute("aria-pressed","false"); });
      btn.classList.add("active");
      btn.setAttribute("aria-pressed","true");
      document.querySelectorAll(".mb-panel").forEach(p => p.classList.remove("active"));
      document.getElementById("panel-" + btn.dataset.panel).classList.add("active");
    });
  });

  /* ── Init ── */
  updateMyth(0);
</script>

</body>
</html>
